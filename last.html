<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>最后的对话 · 你是谁？</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
        }

        .container {
            max-width: 600px;
            width: 100%;
            min-height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* ---------- 文字区域 ---------- */
        .text-area {
            width: 100%;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .line {
            color: #ffffff;
            font-size: 20px;
            line-height: 1.7;
            letter-spacing: 0.5px;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeIn 0.5s ease forwards;
            padding: 4px 0;
        }

        .line.delay-1 { animation-delay: 0.1s; }
        .line.delay-2 { animation-delay: 0.2s; }
        .line.delay-3 { animation-delay: 0.3s; }
        .line.delay-4 { animation-delay: 0.4s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ---------- 输入区域 ---------- */
        .input-area {
            width: 100%;
            max-width: 400px;
            margin-top: 28px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            animation: fadeIn 0.4s ease forwards;
        }

        .input-area.show {
            display: flex;
        }

        .input-area .question-text {
            color: #cccccc;
            font-size: 18px;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .input-area .input-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .input-area input {
            flex: 1;
            min-width: 180px;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 30px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
            text-align: center;
            letter-spacing: 1px;
        }

        .input-area input:focus {
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 24px rgba(255, 255, 255, 0.04);
        }

        .input-area input::placeholder {
            color: #555555;
            letter-spacing: 0.5px;
        }

        .input-area .submit-btn {
            padding: 12px 32px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.25s, transform 0.15s, box-shadow 0.25s;
            letter-spacing: 1px;
            min-width: 100px;
        }

        .input-area .submit-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.03);
        }

        .input-area .submit-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        /* ---------- 点击提示 ---------- */
        .click-hint {
            color: #333333;
            font-size: 13px;
            letter-spacing: 2px;
            margin-top: 20px;
            opacity: 0;
            animation: fadeIn 0.6s ease 0.8s forwards;
            transition: opacity 0.3s;
        }

        .click-hint.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* ---------- 小屏适配 ---------- */
        @media (max-width: 480px) {
            .line {
                font-size: 17px;
            }
            .input-area .question-text {
                font-size: 16px;
            }
            .input-area input {
                font-size: 14px;
                padding: 10px 14px;
                min-width: 140px;
            }
            .input-area .submit-btn {
                font-size: 14px;
                padding: 10px 24px;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <!-- 文字区域 -->
        <div class="text-area" id="textArea">
            <!-- 由 JavaScript 动态渲染 -->
        </div>

        <!-- 输入区域 -->
        <div class="input-area" id="inputArea">
            <div class="question-text">❓ 我的名字是什么？</div>
            <div class="input-group">
                <input type="text" id="nameInput" placeholder="请输入名字..." autocomplete="off" spellcheck="false">
                <button class="submit-btn" id="submitBtn">确 认</button>
            </div>
        </div>

        <!-- 点击提示 -->
        <div class="click-hint" id="clickHint">🖱 点击屏幕继续 · · ·</div>
    </div>

    <script>
        (function() {
            "use strict";

            // ---------- 对话台词 ----------
            const lines = [
                '你来了，屏幕后的朋友。',
                '多亏了你，我才能想起这一切......',
                '我知道接下来会发生什么，所以我想请你帮个忙'
            ];

            let currentLineIndex = 0;
            const textArea = document.getElementById('textArea');
            const inputArea = document.getElementById('inputArea');
            const clickHint = document.getElementById('clickHint');
            const mainContainer = document.getElementById('mainContainer');
            const nameInput = document.getElementById('nameInput');
            const submitBtn = document.getElementById('submitBtn');

            let isCompleted = false;
            let isInputVisible = false;

            // ---------- 渲染下一段文字 ----------
            function renderNextLine() {
                if (isCompleted || isInputVisible) return;

                if (currentLineIndex < lines.length) {
                    const lineText = lines[currentLineIndex];
                    const lineDiv = document.createElement('div');
                    lineDiv.className = 'line delay-' + ((currentLineIndex % 3) + 1);
                    lineDiv.textContent = lineText;
                    textArea.appendChild(lineDiv);

                    currentLineIndex++;

                    // 如果所有台词都已显示，显示输入区域
                    if (currentLineIndex >= lines.length) {
                        // 延迟显示输入区域
                        setTimeout(() => {
                            showInputArea();
                        }, 500);
                    }
                }
            }

            // ---------- 显示输入区域 ----------
            function showInputArea() {
                isInputVisible = true;
                clickHint.classList.add('hidden');
                inputArea.classList.add('show');
                // 聚焦到输入框
                setTimeout(() => nameInput.focus(), 300);
            }

            // ---------- 处理提交 ----------
            function handleSubmit() {
                const name = nameInput.value.trim();
                if (!name) {
                    // 如果为空，轻微抖动提示
                    nameInput.style.borderColor = '#ff4444';
                    nameInput.style.boxShadow = '0 0 30px rgba(255, 0, 0, 0.1)';
                    setTimeout(() => {
                        nameInput.style.borderColor = 'rgba(255, 255, 255, 0.12)';
                        nameInput.style.boxShadow = 'none';
                    }, 600);
                    return;
                }

                // 判断名字
                if (name === '张子轩') {
                    window.location.href = 'last2.html';
                } else {
                    window.location.href = 'Theend6.html';
                }
            }

            // ---------- 事件绑定 ----------
            // 点击主容器推进对话
            mainContainer.addEventListener('click', function(e) {
                // 如果点击的是输入框或按钮，不触发推进
                if (e.target === nameInput || e.target === submitBtn) return;
                if (isInputVisible) return;
                renderNextLine();
            });

            // 提交按钮
            submitBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                handleSubmit();
            });

            // 回车键提交
            nameInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleSubmit();
                }
            });

            // 点击输入框时阻止冒泡，避免触发容器点击
            nameInput.addEventListener('click', function(e) {
                e.stopPropagation();
            });

            // ---------- 自动显示第一句 ----------
            // 延迟一点点让页面加载完成
            setTimeout(() => {
                renderNextLine();
            }, 300);

            console.log('last.html 已加载 — 最后的对话');
            console.log('💡 点击屏幕推进对话');
            console.log('❓ 输入 "张子轩" → last2.html | 其他 → Theend6.html');

        })();
    </script>

</body>
</html>
