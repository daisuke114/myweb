<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>真实 · 血肉墙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
            position: relative;
        }

        /* ---------- 密集背景（图片平铺） ---------- */
        .bg-tile {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background-image: url('https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAEXC-dqUxN-GDx4R8sx0dJB75D3O8dnBAACHSgAAnbMmFZbAucHeptiUDwE.png');
            background-repeat: repeat;
            background-size: 80px 80px;
            background-position: 0 0;
            opacity: 0.5;
        }

        /* 暗色遮罩让文字更清晰 */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            background: rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        /* ---------- 内容容器 ---------- */
        .container {
            position: relative;
            z-index: 2;
            max-width: 600px;
            width: 100%;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ---------- 文字区域 ---------- */
        .text-area {
            width: 100%;
            text-align: center;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .line {
            font-size: 20px;
            line-height: 1.7;
            letter-spacing: 0.5px;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeIn 0.6s ease forwards;
            padding: 4px 0;
        }

        .line.delay-1 { animation-delay: 0.1s; }
        .line.delay-2 { animation-delay: 0.2s; }
        .line.delay-3 { animation-delay: 0.3s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .line.white {
            color: #ffffff;
        }

        .line.red {
            color: #cc0000;
        }

        /* ---------- 选项按钮 ---------- */
        .options-area {
            width: 100%;
            max-width: 400px;
            margin-top: 28px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            animation: fadeIn 0.5s ease forwards;
        }

        .options-area.show {
            display: flex;
        }

        .option-btn {
            padding: 14px 36px;
            border: 1px solid rgba(200, 0, 0, 0.25);
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.25s, transform 0.15s, border-color 0.25s, box-shadow 0.25s;
            text-align: center;
            letter-spacing: 2px;
            background: rgba(200, 0, 0, 0.04);
            color: #cc0000;
            text-shadow: 0 0 20px rgba(200, 0, 0, 0.1);
        }

        .option-btn:hover {
            background: rgba(200, 0, 0, 0.12);
            border-color: rgba(200, 0, 0, 0.4);
            box-shadow: 0 0 40px rgba(200, 0, 0, 0.06);
        }

        .option-btn:active {
            transform: scale(0.95);
            background: rgba(200, 0, 0, 0.2);
        }

        /* ---------- 点击提示 ---------- */
        .click-hint {
            color: #444444;
            font-size: 13px;
            letter-spacing: 2px;
            margin-top: 20px;
            opacity: 0;
            animation: fadeIn 0.6s ease 0.8s forwards;
            transition: opacity 0.3s ease;
        }

        .click-hint.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* ---------- 最终爆发（布满屏幕） ---------- */
        .final-burst {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            overflow: hidden;
        }

        .final-burst.show {
            display: flex;
        }

        .final-burst .burst-text {
            color: #cc0000;
            font-size: 14px;
            line-height: 1.2;
            letter-spacing: 0px;
            text-align: justify;
            word-break: break-all;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(200, 0, 0, 0.1);
            max-width: 100%;
            max-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            opacity: 0;
            animation: burstIn 0.8s ease forwards;
        }

        @keyframes burstIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ---------- 小屏适配 ---------- */
        @media (max-width: 480px) {
            .line {
                font-size: 17px;
            }
            .option-btn {
                font-size: 16px;
                padding: 12px 28px;
            }
            .bg-tile {
                background-size: 50px 50px;
            }
            .final-burst .burst-text {
                font-size: 10px;
            }
        }
        @media (max-width: 380px) {
            .final-burst .burst-text {
                font-size: 8px;
            }
        }
    </style>
</head>
<body>

    <!-- 密集背景 -->
    <div class="bg-tile"></div>
    <div class="bg-overlay"></div>

    <!-- 最终爆发（全屏） -->
    <div class="final-burst" id="finalBurst">
        <div class="burst-text" id="burstText"></div>
    </div>

    <!-- 内容 -->
    <div class="container" id="mainContainer">
        <!-- 文字区域 -->
        <div class="text-area" id="textArea">
            <!-- 由 JavaScript 动态渲染 -->
        </div>

        <!-- 选项区域 -->
        <div class="options-area" id="optionsArea">
            <button class="option-btn" id="optionBtn">操你妈</button>
        </div>

        <!-- 点击提示 -->
        <div class="click-hint" id="clickHint">🖱 点击屏幕继续 · · ·</div>
    </div>

    <script>
        (function() {
            "use strict";

            // ---------- 对话台词 ----------
            const lines = [
                { text: '“为什么那么你就是学不会尊重人呢......?”', class: 'white' },
                { text: '“我本来可以救他们的！如果你是我，你也会理解我的所作所为！但你只是一个\'观众\'而已！”', class: 'red' }
            ];

            let currentLineIndex = 0;
            let isCompleted = false;
            let isOptionsVisible = false;
            let isFinalStage = false;

            const textArea = document.getElementById('textArea');
            const clickHint = document.getElementById('clickHint');
            const mainContainer = document.getElementById('mainContainer');
            const optionsArea = document.getElementById('optionsArea');
            const optionBtn = document.getElementById('optionBtn');
            const finalBurst = document.getElementById('finalBurst');
            const burstText = document.getElementById('burstText');

            // ---------- 渲染下一段文字 ----------
            function renderNextLine() {
                if (isCompleted || isOptionsVisible) return;

                if (currentLineIndex < lines.length) {
                    const lineData = lines[currentLineIndex];
                    const lineDiv = document.createElement('div');
                    lineDiv.className = 'line ' + lineData.class + ' delay-' + ((currentLineIndex % 3) + 1);
                    lineDiv.textContent = lineData.text;
                    textArea.appendChild(lineDiv);

                    currentLineIndex++;

                    if (currentLineIndex >= lines.length) {
                        isCompleted = true;
                        setTimeout(() => {
                            showOptions();
                        }, 700);
                    }
                }
            }

            // ---------- 显示选项 ----------
            function showOptions() {
                isOptionsVisible = true;
                clickHint.classList.add('hidden');
                optionsArea.classList.add('show');
            }

            // ---------- 选项点击：全屏爆发 ----------
            function handleOptionClick() {
                if (isFinalStage) return;
                isFinalStage = true;

                // 隐藏选项和主内容
                optionsArea.classList.remove('show');
                optionBtn.style.display = 'none';
                mainContainer.style.opacity = '0';
                mainContainer.style.transition = 'opacity 0.3s';

                // 构建爆发文字
                const block1 = '你阻止不了我'.repeat(50);
                const block2 = '我要活下去'.repeat(50);
                const fullText = block1 + block1 + block1 + block2 + block2 + block2;

                // 填入爆发容器
                burstText.textContent = fullText;

                // 显示爆发层
                finalBurst.classList.add('show');

                // 延迟后跳转
                setTimeout(() => {
                    window.location.href = 'Real2.html';
                }, 2500);
            }

            // ---------- 点击事件 ----------
            mainContainer.addEventListener('click', function(e) {
                if (e.target === optionBtn) return;
                if (isOptionsVisible) return;
                if (isFinalStage) return;
                renderNextLine();
            });

            optionBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                handleOptionClick();
            });

            // ---------- 自动显示第一句 ----------
            setTimeout(() => {
                renderNextLine();
            }, 400);

            console.log('Real.html 已加载 — 血肉墙背景');
            console.log('💡 点击屏幕推进对话');
            console.log('🔴 点击 "操你妈" → 全屏爆发 → Real2.html');

        })();
    </script>

</body>
</html>
