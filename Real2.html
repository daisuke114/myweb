<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>真结局 · 什么也没有发生...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            overflow: hidden;
            cursor: default;
            user-select: none;
        }

        .container {
            max-width: 600px;
            width: 100%;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* ---------- 文字区域 ---------- */
        .text-area {
            width: 100%;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .line {
            color: #ffffff;
            font-size: 20px;
            line-height: 1.8;
            letter-spacing: 0.5px;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeIn 0.8s ease forwards;
            padding: 4px 0;
        }

        .line.delay-1 { animation-delay: 0.2s; }
        .line.delay-2 { animation-delay: 0.6s; }
        .line.delay-3 { animation-delay: 1.0s; }
        .line.delay-4 { animation-delay: 1.8s; }
        .line.delay-5 { animation-delay: 2.6s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .line.faint {
            color: #666666;
            font-size: 18px;
            letter-spacing: 2px;
        }

        /* ---------- 结局标题 ---------- */
        .ending-title {
            margin-top: 40px;
            text-align: center;
            opacity: 0;
            transform: translateY(16px);
            animation: fadeIn 1.2s ease 3.6s forwards;
        }

        .ending-title .ex {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 4px;
        }

        .ending-title .ex-sub {
            font-size: 16px;
            color: #666666;
            margin-top: 8px;
            letter-spacing: 3px;
            font-weight: 300;
        }

        .ending-title .ex-desc {
            font-size: 14px;
            color: #444444;
            margin-top: 12px;
            letter-spacing: 2px;
            font-weight: 300;
            font-style: italic;
        }

        /* ---------- 按钮区域 ---------- */
        .actions-area {
            margin-top: 30px;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            opacity: 0;
            transform: translateY(16px);
            animation: fadeIn 0.8s ease 4.6s forwards;
        }

        .action-btn {
            padding: 12px 32px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            color: #666666;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.25s, transform 0.15s, border-color 0.25s, color 0.25s;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 1px;
            text-align: center;
            min-width: 120px;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            color: #999999;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .action-btn.truth-btn {
            border-color: rgba(200, 0, 0, 0.15);
            color: #884444;
        }

        .action-btn.truth-btn:hover {
            border-color: rgba(200, 0, 0, 0.3);
            color: #cc6666;
            background: rgba(200, 0, 0, 0.04);
        }

        /* ---------- 小屏适配 ---------- */
        @media (max-width: 480px) {
            .line {
                font-size: 17px;
            }
            .line.faint {
                font-size: 15px;
            }
            .ending-title .ex {
                font-size: 18px;
            }
            .ending-title .ex-sub {
                font-size: 14px;
            }
            .action-btn {
                font-size: 13px;
                padding: 10px 24px;
                min-width: 100px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 文字区域 -->
        <div class="text-area" id="textArea">
            <div class="line delay-1">随后，再也没有文字传来......</div>
            <div class="line delay-2">你只能听见屏幕后传来的脚步声，</div>
            <div class="line delay-3">以及一种厚重的铁器划过地面......</div>
            <div class="line delay-4 faint">而后，一声男人的惨叫传来，</div>
            <div class="line delay-5 faint">但你又能做什么呢？</div>
        </div>

        <!-- 结局标题 -->
        <div class="ending-title">
            <div class="ex">✦ 真结局 ✦</div>
            <div class="ex-sub">“什么也没有发生...”</div>
            <div class="ex-desc">— 沉默 · 旁观 · 无能为力 —</div>
        </div>

        <!-- 按钮区域 -->
        <div class="actions-area">
            <a href="index.html" class="action-btn">🔄 重新来过</a>
            <a href="All.html" class="action-btn truth-btn">📖 真相</a>
        </div>
    </div>

    <script>
        console.log('Real2.html 已加载 — 真结局 "什么也没有发生..."');
        console.log('💀 你听见了脚步声、铁器声、惨叫声...但你什么都做不了。');
        console.log('📖 点击 "真相" 可前往 All.html');
    </script>

</body>
</html>
