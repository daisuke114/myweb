<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>结局 3 · 绝命厨师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            overflow: hidden;
            cursor: default;
            user-select: none;
        }

        .container {
            max-width: 620px;
            width: 100%;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* ---------- 文字区域 ---------- */
        .text-area {
            width: 100%;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .line {
            color: #e8e0d8;
            font-size: 20px;
            line-height: 1.8;
            letter-spacing: 0.5px;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeIn 0.8s ease forwards;
            padding: 4px 0;
        }

        .line.delay-1 { animation-delay: 0.3s; }
        .line.delay-2 { animation-delay: 0.9s; }
        .line.delay-3 { animation-delay: 1.5s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .line .highlight {
            color: #cc8844;
            font-weight: 500;
        }

        .line .dish-name {
            color: #dd9966;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .line .chef-note {
            color: #888888;
            font-style: italic;
            font-size: 17px;
        }

        .line.ending-line {
            color: #bbaa99;
            font-size: 18px;
            letter-spacing: 2px;
        }

        /* ---------- 菜品列表（模拟高级餐厅介绍） ---------- */
        .menu-list {
            margin-top: 6px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            opacity: 0;
            animation: fadeIn 0.8s ease 2.2s forwards;
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        .menu-item {
            color: #b0a090;
            font-size: 16px;
            letter-spacing: 0.5px;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .menu-item .step {
            color: #cc8844;
            font-weight: 600;
            margin-right: 6px;
        }

        .menu-item .desc {
            color: #c0b0a0;
        }

        /* ---------- 结局标题 ---------- */
        .ending-title {
            margin-top: 30px;
            text-align: center;
            opacity: 0;
            transform: translateY(16px);
            animation: fadeIn 1.2s ease 4.0s forwards;
        }

        .ending-title .ex {
            font-size: 22px;
            font-weight: 700;
            color: #cc8844;
            letter-spacing: 4px;
            text-shadow: 0 0 40px rgba(200, 136, 68, 0.05);
        }

        .ending-title .ex-sub {
            font-size: 16px;
            color: #887766;
            margin-top: 8px;
            letter-spacing: 3px;
            font-weight: 300;
        }

        .ending-title .ex-desc {
            font-size: 14px;
            color: #665544;
            margin-top: 10px;
            letter-spacing: 2px;
            font-weight: 300;
            font-style: italic;
        }

        /* ---------- 重新开始按钮 ---------- */
        .restart-area {
            margin-top: 30px;
            opacity: 0;
            transform: translateY(16px);
            animation: fadeIn 0.8s ease 5.0s forwards;
        }

        .restart-btn {
            padding: 12px 36px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(200, 136, 68, 0.15);
            border-radius: 30px;
            color: #887766;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.25s, transform 0.15s, border-color 0.25s, color 0.25s;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 1px;
        }

        .restart-btn:hover {
            background: rgba(200, 136, 68, 0.04);
            border-color: rgba(200, 136, 68, 0.25);
            color: #bbaa99;
        }

        .restart-btn:active {
            transform: scale(0.95);
        }

        /* ---------- 小屏适配 ---------- */
        @media (max-width: 480px) {
            .line {
                font-size: 17px;
            }
            .line.ending-line {
                font-size: 15px;
            }
            .menu-item {
                font-size: 14px;
            }
            .ending-title .ex {
                font-size: 18px;
            }
            .ending-title .ex-sub {
                font-size: 14px;
            }
            .restart-btn {
                font-size: 13px;
                padding: 10px 28px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 文字区域 -->
        <div class="text-area">
            <div class="line delay-1">“......”</div>
            <div class="line delay-2">“品味不错，我的朋友。”</div>
            <div class="line delay-3">随后，屏幕后传来处理肉类的声音，<br>那人便开始给你介绍菜品的名称和步骤......</div>
            <div class="line delay-3 chef-note" style="font-size:16px; color:#888; animation-delay:1.8s;">
                — 就像在高级餐厅里一样 —
            </div>
        </div>

        <!-- 菜单介绍 -->
        <div class="menu-list">
            <div class="menu-item">
                <span class="step">●</span>
                <span class="desc">前菜 · 薄切 <span class="dish-name">“晨光”</span> — 以最锋利的手法，致敬第一缕曙光</span>
            </div>
            <div class="menu-item">
                <span class="step">●</span>
                <span class="desc">汤品 · 慢炖 <span class="dish-name">“余烬”</span> — 用时间萃取，每一口都是沉淀的回响</span>
            </div>
            <div class="menu-item">
                <span class="step">●</span>
                <span class="desc">主菜 · 炙烤 <span class="dish-name">“抉择”</span> — 烈火之上，皮脆肉嫩，汁水是最后的告白</span>
            </div>
            <div class="menu-item">
                <span class="step">●</span>
                <span class="desc">甜品 · 凝 <span class="dish-name">“寂静”</span> — 入口即化，余味是无声的句点</span>
            </div>
            <div class="menu-item" style="border-bottom: none; padding-top:6px; color:#665544; font-size:14px;">
                —— 主厨精选 · 仅此一席 ——
            </div>
        </div>

        <!-- 结局标题 -->
        <div class="ending-title">
            <div class="ex">✦ 结局 3 ✦</div>
            <div class="ex-sub">“美食家”</div>
            <div class="ex-desc">— 餐盘之上 · 生死之间 —</div>
        </div>

        <!-- 重新开始 -->
        <div class="restart-area">
            <a href="index.html" class="restart-btn">🔄 重新来过</a>
        </div>
    </div>

    <script>
        console.log('meat.html 已加载 — 结局 3 "绝命厨师"');
        console.log('🍽️ 菜品：晨光 · 余烬 · 抉择 · 寂静');
    </script>

</body>
</html>
